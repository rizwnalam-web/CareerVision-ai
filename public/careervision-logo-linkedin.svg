<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f2e"/>
      <stop offset="100%" stop-color="#1a1454"/>
    </linearGradient>
    <linearGradient id="path-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
    <radialGradient id="goal-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6ee7b7" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#10b981" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="node-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="24" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Outer card -->
  <rect width="800" height="800" rx="160" fill="url(#bg-grad)" filter="url(#soft-shadow)"/>
  <!-- Subtle border ring -->
  <rect x="3" y="3" width="794" height="794" rx="158" fill="none" stroke="#4338ca" stroke-width="3" opacity="0.45"/>

  <!-- Background scatter dots -->
  <circle cx="100" cy="165" r="6"   fill="#4338ca" opacity="0.18"/>
  <circle cx="195" cy="100" r="4.5" fill="#4338ca" opacity="0.14"/>
  <circle cx="490" cy="650" r="6"   fill="#4338ca" opacity="0.18"/>
  <circle cx="650" cy="590" r="4.5" fill="#4338ca" opacity="0.14"/>
  <circle cx="118" cy="590" r="4.5" fill="#4338ca" opacity="0.12"/>
  <circle cx="680" cy="210" r="4"   fill="#6366f1" opacity="0.16"/>
  <circle cx="750" cy="450" r="3"   fill="#6366f1" opacity="0.10"/>
  <circle cx="55"  cy="420" r="3"   fill="#4338ca" opacity="0.10"/>

  <!-- Career trajectory path -->
  <path
    d="M 148 634 C 200 576, 248 530, 310 482 C 372 434, 422 394, 480 340 C 538 286, 582 246, 648 184"
    stroke="url(#path-grad)"
    stroke-width="22"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Node glow halos -->
  <circle cx="148" cy="634" r="50"  fill="url(#node-glow)" opacity="0.55"/>
  <circle cx="310" cy="482" r="56"  fill="url(#node-glow)" opacity="0.55"/>
  <circle cx="480" cy="340" r="62"  fill="url(#node-glow)" opacity="0.55"/>
  <circle cx="648" cy="184" r="100" fill="url(#goal-glow)"  opacity="0.55"/>

  <!-- Milestone node 1 (start) -->
  <circle cx="148" cy="634" r="25" fill="#4338ca"/>
  <circle cx="148" cy="634" r="13" fill="#6366f1"/>
  <circle cx="148" cy="634" r="5"  fill="#c7d2fe"/>

  <!-- Milestone node 2 -->
  <circle cx="310" cy="482" r="28" fill="#4f46e5"/>
  <circle cx="310" cy="482" r="14" fill="#818cf8"/>
  <circle cx="310" cy="482" r="5.5" fill="#e0e7ff"/>

  <!-- Milestone node 3 -->
  <circle cx="480" cy="340" r="31" fill="#6366f1"/>
  <circle cx="480" cy="340" r="16" fill="#a5b4fc"/>
  <circle cx="480" cy="340" r="6"  fill="#eef2ff"/>

  <!-- Goal node (star burst) -->
  <circle cx="648" cy="184" r="52" fill="#10b981" opacity="0.22"/>
  <circle cx="648" cy="184" r="36" fill="#10b981" opacity="0.35"/>
  <circle cx="648" cy="184" r="22" fill="#34d399"/>
  <circle cx="648" cy="184" r="11" fill="#6ee7b7"/>
  <circle cx="648" cy="184" r="4"  fill="#ffffff"/>

  <!-- AI spark icon (top-right of goal) -->
  <g transform="translate(675, 145)">
    <circle r="16" fill="#0a0f2e" opacity="0.7"/>
    <!-- Spark lines -->
    <line x1="0" y1="-10" x2="0" y2="-6"  stroke="#6ee7b7" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="6"   x2="0" y2="10"  stroke="#6ee7b7" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-10" y1="0" x2="-6" y2="0"  stroke="#6ee7b7" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="6"  y1="0"  x2="10" y2="0"  stroke="#6ee7b7" stroke-width="2.5" stroke-linecap="round"/>
    <circle r="3.5" fill="#6ee7b7"/>
  </g>

  <!-- Wordmark: CareerVision -->
  <text
    x="400" y="734"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="62"
    font-weight="900"
    letter-spacing="-2"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="auto"
  >CareerVision<tspan fill="#6366f1" font-style="italic">AI</tspan></text>
  <!-- Tagline -->
  <text
    x="400" y="776"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="22"
    font-weight="700"
    letter-spacing="6"
    fill="#818cf8"
    text-anchor="middle"
    dominant-baseline="auto"
    opacity="0.85"
  >GLOBAL CAREER INTELLIGENCE</text>
</svg>
