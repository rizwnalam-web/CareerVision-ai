<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" role="img" aria-label="CareerVision AI logo">
  <defs>
    <!-- Background gradient: deep navy to dark indigo -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f2e"/>
      <stop offset="100%" stop-color="#1a1454"/>
    </linearGradient>

    <!-- Career path gradient: indigo → violet → lavender -->
    <linearGradient id="pathGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>

    <!-- Emerald glow gradient for goal node -->
    <radialGradient id="goalGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6ee7b7" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#10b981" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0"/>
    </radialGradient>

    <!-- Indigo glow for path nodes -->
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>

    <!-- Drop shadow for depth -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#4f46e5" flood-opacity="0.3"/>
    </filter>

    <!-- Blur for glows -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- ── Rounded-square badge background ── -->
  <rect width="512" height="512" rx="110" fill="url(#bgGrad)"/>

  <!-- Subtle inner border -->
  <rect x="2" y="2" width="508" height="508" rx="109" fill="none" stroke="#4338ca" stroke-width="2" opacity="0.4"/>

  <!-- ── Background scatter dots (AI/data feel) ── -->
  <circle cx="68"  cy="110" r="4" fill="#4338ca" opacity="0.18"/>
  <circle cx="128" cy="68"  r="3" fill="#4338ca" opacity="0.14"/>
  <circle cx="200" cy="88"  r="3" fill="#4338ca" opacity="0.12"/>
  <circle cx="320" cy="420" r="4" fill="#4338ca" opacity="0.18"/>
  <circle cx="420" cy="380" r="3" fill="#4338ca" opacity="0.14"/>
  <circle cx="460" cy="300" r="3" fill="#4338ca" opacity="0.10"/>
  <circle cx="80"  cy="380" r="3" fill="#4338ca" opacity="0.12"/>
  <circle cx="440" cy="140" r="2.5" fill="#6366f1" opacity="0.15"/>
  <circle cx="380" cy="460" r="2.5" fill="#4338ca" opacity="0.12"/>
  <circle cx="150" cy="440" r="3" fill="#4338ca" opacity="0.10"/>

  <!-- ── Subtle grid lines ── -->
  <line x1="0" y1="256" x2="512" y2="256" stroke="#4338ca" stroke-width="0.8" opacity="0.06"/>
  <line x1="256" y1="0" x2="256" y2="512" stroke="#4338ca" stroke-width="0.8" opacity="0.06"/>

  <!-- ── Career trajectory path ── -->
  <!-- Main smooth curve: bottom-left to top-right -->
  <path
    d="M 96 406 C 130 370, 160 340, 200 310 C 240 280, 272 252, 310 218 C 348 184, 376 158, 416 118"
    stroke="url(#pathGrad)"
    stroke-width="14"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#shadow)"
  />

  <!-- ── Glow halos behind nodes ── -->
  <circle cx="96"  cy="406" r="32" fill="url(#nodeGlow)" opacity="0.5"/>
  <circle cx="200" cy="310" r="36" fill="url(#nodeGlow)" opacity="0.5"/>
  <circle cx="310" cy="218" r="40" fill="url(#nodeGlow)" opacity="0.5"/>
  <!-- Goal node glow -->
  <circle cx="416" cy="118" r="64" fill="url(#goalGlow)" opacity="0.5"/>

  <!-- ── Milestone nodes ── -->
  <!-- Node 1 (start) -->
  <circle cx="96"  cy="406" r="16" fill="#4338ca"/>
  <circle cx="96"  cy="406" r="8"  fill="#6366f1"/>
  <circle cx="96"  cy="406" r="3"  fill="#c7d2fe"/>

  <!-- Node 2 -->
  <circle cx="200" cy="310" r="18" fill="#4f46e5"/>
  <circle cx="200" cy="310" r="9"  fill="#818cf8"/>
  <circle cx="200" cy="310" r="3.5" fill="#e0e7ff"/>

  <!-- Node 3 -->
  <circle cx="310" cy="218" r="20" fill="#6366f1"/>
  <circle cx="310" cy="218" r="10" fill="#a5b4fc"/>
  <circle cx="310" cy="218" r="4"  fill="white"/>

  <!-- ── Goal node (emerald star) ── -->
  <circle cx="416" cy="118" r="36" fill="#065f46"/>
  <circle cx="416" cy="118" r="26" fill="#059669"/>
  <circle cx="416" cy="118" r="16" fill="#10b981"/>
  <circle cx="416" cy="118" r="7"  fill="white"/>

  <!-- Star rays around goal node -->
  <!-- Top -->
  <line x1="416" y1="76"  x2="416" y2="62"  stroke="#34d399" stroke-width="4" stroke-linecap="round"/>
  <!-- Top-right -->
  <line x1="446" y1="88"  x2="456" y2="78"  stroke="#34d399" stroke-width="3" stroke-linecap="round"/>
  <!-- Right -->
  <line x1="458" y1="118" x2="472" y2="118" stroke="#34d399" stroke-width="4" stroke-linecap="round"/>
  <!-- Bottom-right -->
  <line x1="446" y1="148" x2="456" y2="158" stroke="#34d399" stroke-width="3" stroke-linecap="round"/>
  <!-- Top-left -->
  <line x1="386" y1="88"  x2="376" y2="78"  stroke="#34d399" stroke-width="3" stroke-linecap="round"/>
  <!-- Left -->
  <line x1="374" y1="118" x2="360" y2="118" stroke="#34d399" stroke-width="4" stroke-linecap="round"/>

  <!-- ── Small connector dots on path between nodes ── -->
  <circle cx="148" cy="358" r="5" fill="#4f46e5" opacity="0.55"/>
  <circle cx="255" cy="264" r="5" fill="#6366f1" opacity="0.55"/>
  <circle cx="363" cy="168" r="5" fill="#818cf8" opacity="0.55"/>

  <!-- ── "AI" label subtly in bottom-right corner ── -->
  <text x="460" y="482"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="28"
    font-weight="800"
    fill="#4f46e5"
    opacity="0.35"
    text-anchor="end"
    letter-spacing="-1">AI</text>
</svg>
