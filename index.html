<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA essentials -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="EasyCareer AI" />

    <!-- Favicon & touch icons -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />

    <!-- Primary SEO -->
    <meta name="description" content="Optimize your resume for applicant tracking systems, identify skill gaps, and practice mock interviews in under two minutes — for free." />
    <meta name="keywords" content="AI resume optimizer, interview prep, career coaching, job matching, skill gap analysis, visa pathways" />
    <meta name="author" content="EasyCareer AI" />

    <!-- Open Graph (LinkedIn, Facebook, WhatsApp) -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="EasyCareer AI" />
    <meta property="og:url"         content="https://easycareer-ai.decodflow.com/" />
    <meta property="og:title"       content="EasyCareer AI – Free AI Resume Optimizer &amp; Interview Prep" />
    <meta property="og:description" content="Optimize your resume for applicant tracking systems, identify skill gaps, and practice mock interviews in under two minutes — for free." />
    <meta property="og:image"       content="https://easycareer-ai.decodflow.com/easycareer-og.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="627" />
    <meta property="og:image:alt"   content="EasyCareer AI – Global Career Intelligence platform" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="EasyCareer AI – Free AI Resume Optimizer &amp; Interview Prep" />
    <meta name="twitter:description" content="Optimize your resume for applicant tracking systems, identify skill gaps, and practice mock interviews in under two minutes — for free." />
    <meta name="twitter:image"       content="https://easycareer-ai.decodflow.com/easycareer-og.png" />

    <!-- Prevent tap delay on mobile -->
    <meta name="format-detection" content="telephone=no" />

    <title>EasyCareer AI – Free AI Resume Optimizer &amp; Interview Prep</title>

    <!-- Accessibility: supported locale declarations -->
    <link rel="alternate" hreflang="en" href="/" />
    <link rel="alternate" hreflang="es" href="/?lang=es" />
    <link rel="alternate" hreflang="fr" href="/?lang=fr" />
    <link rel="alternate" hreflang="ar" href="/?lang=ar" />
    <link rel="alternate" hreflang="zh" href="/?lang=zh" />
    <link rel="alternate" hreflang="x-default" href="/" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
