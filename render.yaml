services:
  - type: web
    name: careervision-server
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: BOCLIPS_API_KEY
        sync: false
      - key: PORT
        value: 3001
